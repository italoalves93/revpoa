<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor — Revista Porto Alegre</title>
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
  <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F5F0E8;
      --white:    #ffffff;
      --accent:   #e05a18;
      --accent-h: #c44d12;
      --text:     #1a1a1a;
      --muted:    #888;
      --border:   #ddd;
      --radius:   4px;
      --font-ui:  -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    body { background: var(--bg); font-family: var(--font-ui); color: var(--text); min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    .login-card {
      background: var(--white); border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 2.5rem 2rem; width: 100%; max-width: 400px;
    }
    .login-card h1 {
      font-size: 1.1rem; font-weight: 600; margin-bottom: .25rem; color: var(--text);
    }
    .login-card p { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }
    .login-card a { color: var(--accent); }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: .8rem; font-weight: 500; margin-bottom: .35rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .field input, .field select, .field textarea {
      width: 100%; padding: .55rem .75rem; border: 1px solid var(--border);
      border-radius: var(--radius); font-family: var(--font-ui); font-size: .9rem;
      color: var(--text); background: var(--white); transition: border-color .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .field textarea { resize: vertical; }
    .field small { display: block; font-size: .75rem; color: var(--muted); margin-top: .3rem; }
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .6rem 1.2rem; border-radius: var(--radius); border: none;
      font-family: var(--font-ui); font-size: .9rem; font-weight: 500;
      cursor: pointer; transition: background .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-full { width: 100%; justify-content: center; }
    .error { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; padding: .6rem .9rem; border-radius: var(--radius); font-size: .85rem; margin-bottom: 1rem; }
    .success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; padding: .75rem 1rem; border-radius: var(--radius); font-size: .9rem; margin-top: 1rem; }

    /* ── Top bar ── */
    #editor-screen { display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: .6rem 1.25rem; position: sticky; top: 0; z-index: 100;
      gap: 1rem;
    }
    .topbar-left { display: flex; align-items: center; gap: .75rem; }
    .topbar-logo { font-weight: 700; font-size: .95rem; color: var(--text); text-decoration: none; }
    .topbar-logo span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: .6rem; }
    .status { font-size: .8rem; color: var(--muted); }

    /* ── Main layout ── */
    .editor-layout {
      display: grid; grid-template-columns: 300px 1fr;
      flex: 1; gap: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--white); border-right: 1px solid var(--border);
      padding: 1.25rem; overflow-y: auto; height: calc(100vh - 49px);
      position: sticky; top: 49px;
    }
    .sidebar-section { margin-bottom: 1.5rem; }
    .sidebar-section h2 {
      font-size: .7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); margin-bottom: .75rem;
      padding-bottom: .4rem; border-bottom: 1px solid var(--border);
    }
    .permalink-preview {
      font-size: .75rem; color: var(--muted); margin-top: .3rem;
      word-break: break-all;
    }
    .permalink-preview span { color: var(--accent); }
    .img-preview { margin-top: .5rem; }
    .img-preview img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--border); }
    .img-insert-btn { font-size: .78rem; margin-top: .4rem; padding: .35rem .7rem; }
    .upload-status { font-size: .78rem; color: var(--muted); margin-top: .3rem; }
    .fm-preview {
      background: #f8f8f8; border: 1px solid var(--border); border-radius: var(--radius);
      padding: .6rem .75rem; font-family: monospace; font-size: .72rem;
      color: #444; white-space: pre-wrap; word-break: break-all;
    }

    /* ── Editor area ── */
    .editor-area { padding: 1.5rem; overflow-y: auto; height: calc(100vh - 49px); }
    .editor-title-input {
      width: 100%; border: none; outline: none; font-family: Georgia, serif;
      font-size: 1.9rem; font-weight: 700; color: var(--text);
      line-height: 1.2; margin-bottom: 1rem; background: transparent;
      border-bottom: 2px solid transparent; transition: border-color .2s;
    }
    .editor-title-input:focus { border-bottom-color: var(--accent); }
    .editor-title-input::placeholder { color: #ccc; }
    .CodeMirror { min-height: 500px; font-size: .92rem; line-height: 1.65; }
    .editor-toolbar { border-radius: var(--radius) var(--radius) 0 0 !important; }
    .CodeMirror { border-radius: 0 0 var(--radius) var(--radius) !important; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--text); color: #fff; padding: .75rem 1.2rem;
      border-radius: var(--radius); font-size: .88rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.2); z-index: 999;
      transform: translateY(0); transition: opacity .3s;
      max-width: 360px;
    }
    .toast.hide { opacity: 0; pointer-events: none; }
    .toast.ok { background: #15803d; }
    .toast.err { background: #b91c1c; }

    @media (max-width: 800px) {
      .editor-layout { grid-template-columns: 1fr; }
      .sidebar { height: auto; position: static; }
      .editor-area { height: auto; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════ LOGIN ═══════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <h1>Revista Porto Alegre</h1>
    <p>Editor de posts. Insira um <a href="https://github.com/settings/tokens/new?scopes=repo&description=RevPOA+Editor" target="_blank">Personal Access Token</a> do GitHub com escopo <code>repo</code>.</p>
    <div id="login-error" class="error" hidden></div>
    <div class="field">
      <label>GitHub Token</label>
      <input type="password" id="pat-input" placeholder="ghp_..." autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
      <small>O token fica salvo apenas neste navegador.</small>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:.5rem;">
      <input type="checkbox" id="remember-token" checked style="width:auto;">
      <label for="remember-token" style="text-transform:none;letter-spacing:0;margin:0;font-size:.85rem;">Lembrar neste navegador</label>
    </div>
        <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- ═══════════════════════════════ EDITOR ═══════════════════════════════ -->
<div id="editor-screen" hidden>

  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Revista <span>Porto Alegre</span></span>
      <span class="status" id="topbar-status"></span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost" onclick="saveDraft()">Salvar rascunho</button>
      <button class="btn btn-primary" id="publish-btn" onclick="publishPost()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2 12l10-9 10 9h-3v9H5v-9H2z"/></svg>
        Publicar
      </button>
      <button class="btn btn-ghost" onclick="logout()" title="Sair">✕</button>
    </div>
  </div>

  <div class="editor-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">

      <div class="sidebar-section">
        <h2>Metadados</h2>

        <div class="field">
          <label>Autor</label>
          <select id="f-author"></select>
        </div>

        <div class="field">
          <label>Data de publicação</label>
          <input type="date" id="f-date">
        </div>

        <div class="field">
          <label>Permalink</label>
          <input type="text" id="f-permalink" placeholder="meu-texto" oninput="onPermalinkInput()">
          <div class="permalink-preview">…/revpoa/<span id="permalink-display">meu-texto</span>/</div>
        </div>

        <div class="field">
          <label>Blurb <small style="text-transform:none;letter-spacing:0;">(chamada)</small></label>
          <textarea id="f-blurb" rows="3" placeholder="Uma ou duas frases de apresentação."></textarea>
        </div>
      </div>

      <div class="sidebar-section">
        <h2>Imagem de capa</h2>
        <div class="field">
          <label>Upload de imagem</label>
          <input type="file" id="f-image-file" accept="image/*" onchange="onImageSelected()">
          <div class="upload-status" id="upload-status"></div>
          <div class="img-preview" id="img-preview" hidden>
            <img id="img-preview-img" src="" alt="">
            <button class="btn btn-ghost img-insert-btn" onclick="insertImageIntoEditor()">Inserir no texto</button>
          </div>
          <small id="uploaded-path"></small>
        </div>
      </div>

      <div class="sidebar-section">
        <h2>Front matter gerado</h2>
        <pre class="fm-preview" id="fm-preview"></pre>
      </div>

    </aside>

    <!-- ── Editor ── -->
    <div class="editor-area">
      <input
        type="text"
        id="f-title"
        class="editor-title-input"
        placeholder="Título do texto…"
        oninput="onTitleInput()"
      >
      <textarea id="editor-content"></textarea>
    </div>

  </div>
</div>

<div class="toast hide" id="toast"></div>

<script>
const REPO   = 'italoalves93/revpoa';
const BRANCH = 'main';
const API    = 'https://api.github.com';

let TOKEN          = '';
let easyMDE        = null;
let uploadedPath   = null;
let authors        = {};
let permalinkEdited = false;

// ── Helpers ──────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const val = id => $(id).value.trim();
const set = (id, v) => { $(id).value = v; };
const txt = (id, v) => { $(id).textContent = v; };

function show(id) { $(id).hidden = false; }
function hide(id) { $(id).hidden = true;  }

function toast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.add('hide'), 5000);
}

function utf8ToB64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}

function b64ToUtf8(b64) {
  const bin = atob(b64.replace(/\n/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function titleToSlug(t) {
  return t.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^\w\s-]/g, '').replace(/\s+/g, '-')
    .replace(/-+/g, '-').replace(/^-+|-+$/g, '');
}

function todayISO() { return new Date().toISOString().slice(0, 10); }

// ── GitHub API ────────────────────────────────────────────────
async function ghFetch(method, path, body) {
  const resp = await fetch(`${API}/repos/${REPO}/${path}`, {
    method,
    headers: {
      'Authorization': `Bearer ${TOKEN}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!resp.ok) {
    const j = await resp.json().catch(() => ({}));
    throw new Error(j.message || `HTTP ${resp.status}`);
  }
  return resp.json();
}

async function validateToken(pat) {
  const resp = await fetch(`${API}/user`, {
    headers: {
      'Authorization': `Bearer ${pat}`,
      'Accept': 'application/vnd.github.v3+json',
    },
  });
  if (!resp.ok) throw new Error('Token inválido ou sem permissão.');
  return resp.json();
}

async function getFileSHA(path) {
  try { return (await ghFetch('GET', `contents/${path}`)).sha; }
  catch { return null; }
}

async function commitFile(filePath, content, message, isBinary = false) {
  const sha = await getFileSHA(filePath);
  return ghFetch('PUT', `contents/${filePath}`, {
    message, branch: BRANCH,
    content: isBinary ? content : utf8ToB64(content),
    ...(sha ? { sha } : {}),
  });
}

// ── Login ─────────────────────────────────────────────────────
async function doLogin() {
  const pat = $('pat-input').value.trim();
  if (!pat) { setLoginError('Cole o token antes de continuar.'); return; }

  const btn = $('login-btn');
  btn.disabled = true;
  btn.textContent = 'Verificando…';
  clearLoginError();

  try {
    await validateToken(pat);
    TOKEN = pat;
    if ($('remember-token').checked) localStorage.setItem('revpoa_token', pat);
    await initEditor();
  } catch (e) {
    setLoginError(e.message);
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

function setLoginError(msg) { const e = $('login-error'); e.textContent = msg; e.hidden = false; }
function clearLoginError()  { $('login-error').hidden = true; }

function logout() {
  localStorage.removeItem('revpoa_token');
  TOKEN = '';
  location.reload();
}

// ── Init editor ───────────────────────────────────────────────
async function initEditor() {
  hide('login-screen');
  show('editor-screen');
  set('f-date', todayISO());

  await loadAuthors();

  // Init EasyMDE only once
  if (!easyMDE) {
    easyMDE = new EasyMDE({
      element: $('editor-content'),
      autofocus: false,
      spellChecker: false,
      autosave: { enabled: false },
      placeholder: 'Escreva o texto aqui em Markdown…',
      toolbar: [
        'bold', 'italic', '|',
        'heading-2', 'heading-3', '|',
        'quote', 'unordered-list', 'ordered-list', '|',
        'link',
        { name: 'image-upload',   action: triggerImageUpload, className: 'fa fa-image',       title: 'Inserir imagem' },
        '|',
        { name: 'capitular',      action: insertCapitular,    className: 'fa fa-font',        title: 'Capitular' },
        { name: 'sep-dots',       action: insertSepDots,      className: 'fa fa-ellipsis-h',  title: 'Separador ···' },
        '|',
        'preview', 'side-by-side', 'fullscreen',
      ],
    });
    easyMDE.codemirror.on('change', updateFMPreview);
    ['f-title','f-author','f-date','f-permalink','f-blurb'].forEach(id =>
      $(id).addEventListener('input', updateFMPreview)
    );
  }

  // Load draft AFTER easyMDE is ready
  loadDraft();
  updateFMPreview();
}

// ── Authors ───────────────────────────────────────────────────
async function loadAuthors() {
  try {
    const r = await ghFetch('GET', 'contents/_data/autores.yml');
    authors = jsyaml.load(b64ToUtf8(r.content)) || {};
    const sel = $('f-author');
    sel.innerHTML = '<option value="">— selecione —</option>';
    Object.entries(authors).forEach(([slug, data]) => {
      const o = document.createElement('option');
      o.value = slug;
      o.textContent = (data && data.nome) ? data.nome : slug;
      sel.appendChild(o);
    });
  } catch (e) {
    toast('Erro ao carregar autores: ' + e.message, 'err');
  }
}

// ── Permalink ─────────────────────────────────────────────────
function onTitleInput() {
  if (!permalinkEdited) {
    const slug = titleToSlug(val('f-title'));
    set('f-permalink', slug);
    txt('permalink-display', slug || 'meu-texto');
  }
  updateFMPreview();
}

function onPermalinkInput() {
  permalinkEdited = true;
  txt('permalink-display', val('f-permalink') || 'meu-texto');
  updateFMPreview();
}

// ── Front matter ──────────────────────────────────────────────
function buildFrontMatter() {
  const title     = val('f-title');
  const date      = val('f-date');
  const author    = val('f-author');
  const permalink = val('f-permalink');
  const blurb     = val('f-blurb');
  let fm = '---\nlayout: post\n';
  fm += `title: '${title.replace(/'/g, "\\'")}'\n`;
  fm += `date: ${date}\n`;
  if (author)    fm += `author: ${author}\n`;
  if (blurb)     fm += `blurb: "${blurb.replace(/"/g, '\\"')}"\n`;
  if (permalink) fm += `permalink: /${permalink}/\n`;
  fm += '---\n';
  return fm;
}

function updateFMPreview() {
  $('fm-preview').textContent = buildFrontMatter();
}

// ── Images ────────────────────────────────────────────────────
function triggerImageUpload() { $('f-image-file').click(); }

async function onImageSelected() {
  const file = $('f-image-file').files[0];
  if (!file) return;
  const st = $('upload-status');
  st.textContent = 'Enviando…';
  try {
    const path = await uploadImageFile(file);
    uploadedPath = path;
    st.textContent = '';
    $('uploaded-path').textContent = path;
    const reader = new FileReader();
    reader.onload = e => {
      $('img-preview-img').src = e.target.result;
      $('img-preview').hidden = false;
    };
    reader.readAsDataURL(file);
    toast('Imagem enviada: ' + file.name, 'ok');
  } catch (e) {
    st.textContent = 'Erro: ' + e.message;
    toast('Falha no upload: ' + e.message, 'err');
  }
}

async function uploadImageFile(file) {
  const d = new Date();
  const yr = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const name = file.name.replace(/\s+/g, '-');
  const repoPath = `assets/${yr}/${mo}/${name}`;
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  await commitFile(repoPath, btoa(bin), `Upload: ${name}`, true);
  return `/assets/${yr}/${mo}/${name}`;
}

function insertImageIntoEditor() {
  if (!uploadedPath || !easyMDE) return;
  const html = `\n<figure class="wp-block-image alignfull">\n  <img src="{{ site.baseurl }}${uploadedPath}" alt="">\n  <figcaption>Legenda © Crédito</figcaption>\n</figure>\n`;
  const cm = easyMDE.codemirror;
  cm.replaceRange(html, cm.getCursor());
  cm.focus();
}

// ── Custom toolbar ────────────────────────────────────────────
function insertCapitular() {
  const cm = easyMDE.codemirror;
  const sel = cm.getSelection() || 'Primeiro parágrafo do texto…';
  cm.replaceSelection(`<p class="has-drop-cap">${sel}</p>`);
}

function insertSepDots() {
  const cm = easyMDE.codemirror;
  cm.replaceRange('\n<hr class="wp-block-separator is-style-dots">\n', cm.getCursor());
}

// ── Draft ─────────────────────────────────────────────────────
function saveDraft() {
  localStorage.setItem('revpoa_draft', JSON.stringify({
    title: val('f-title'), author: val('f-author'),
    date: val('f-date'),   permalink: val('f-permalink'),
    blurb: val('f-blurb'), content: easyMDE ? easyMDE.value() : '',
  }));
  toast('Rascunho salvo.');
}

function loadDraft() {
  const raw = localStorage.getItem('revpoa_draft');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    if (d.title)     set('f-title', d.title);
    if (d.author)    set('f-author', d.author);
    if (d.date)      set('f-date', d.date);
    if (d.permalink) { set('f-permalink', d.permalink); permalinkEdited = true; }
    if (d.blurb)     set('f-blurb', d.blurb);
    if (d.content && easyMDE) easyMDE.value(d.content);
    if (d.title)     onTitleInput();
    txt('topbar-status', 'Rascunho carregado');
    setTimeout(() => txt('topbar-status', ''), 3000);
  } catch {}
}

// ── Publish ───────────────────────────────────────────────────
async function publishPost() {
  const title = val('f-title'), date = val('f-date'),
        author = val('f-author'), permalink = val('f-permalink');
  if (!title)     return toast('Preencha o título.', 'err');
  if (!date)      return toast('Preencha a data.', 'err');
  if (!author)    return toast('Selecione o autor.', 'err');
  if (!permalink) return toast('Preencha o permalink.', 'err');

  const btn = $('publish-btn');
  btn.disabled = true;
  btn.textContent = 'Publicando…';

  try {
    const content  = buildFrontMatter() + '\n' + (easyMDE ? easyMDE.value() : '');
    const fileName = `_posts/${date}-${permalink}.md`;
    await commitFile(fileName, content, `Publica: ${title}`);
    localStorage.removeItem('revpoa_draft');
    toast(`"${title}" publicado!`, 'ok');
    txt('topbar-status', `✓ ${fileName}`);
  } catch (e) {
    toast('Erro ao publicar: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2 12l10-9 10 9h-3v9H5v-9H2z"/></svg> Publicar';
  }
}

// ── Boot ──────────────────────────────────────────────────────
(function boot() {
  const saved = localStorage.getItem('revpoa_token');
  if (!saved) return;
  $('pat-input').value = saved;
  // Silently validate before entering the editor
  validateToken(saved)
    .then(() => { TOKEN = saved; return initEditor(); })
    .catch(() => {
      localStorage.removeItem('revpoa_token');
      $('pat-input').value = '';
    });
})();
</script>
